name: Build smolBSD image

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'www/**'
      - 'app/**'
  pull_request:
  workflow_dispatch:
    inputs:
      img:
        description: "Image target"
        required: true
        default: "base"
      arch:
        description: "Architecture"
        required: true
        default: "amd64"
      service:
        description: "Service to build on top of image"
        required: false
        default: "build"
      mountro:
        description: "Build as read-only (y or empty)"
        required: false
        default: "y"
      curlsh:
        description: "URL to a script to execute as finalizer"
        required: false
        default:

jobs:
  build_img:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    container:
      image: debian:latest
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          apt update && apt install -y curl xz-utils make sudo git libarchive-tools rsync bmake e2fsprogs gdisk
          rm -rf /var/cache

      - name: Build image
        run: |
          for arch in amd64 evbarm-aarch64
          do
            bmake SERVICE=${{ inputs.service }} CURLSH=${{ inputs.curlsh }} ARCH="$arch" MOUNTRO=${{ inputs.mountro || 'y' }} ${{ inputs.img || 'buildimg' }}
            # always build a small rescue image for debugging purposes
            bmake SERVICE=rescue ARCH="$arch" base
          done

      - name: Compress images
        run: |
          cd images
          for f in *.img; do
            echo "Compressing $f..."
            xz -T0 -9e "$f"
            sha256sum ${f}.xz > ${f}.xz.sha256
          done
          rm -f *.img

      - name: Publish images to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest smolBSD images (compressed)"
          files: |
            images/*.img.xz
            images/*.xz.sha256
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  smoler_registry_test:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
        env:
          REGISTRY_STORAGE: inmemory
        options: >-
          --health-cmd "wget --quiet --spider http://127.0.0.1:5000/v2/ || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bmake \
            curl \
            gdisk \
            jq \
            libarchive-tools \
            qemu-system-x86 \
            rsync \
            socat

      - name: Build Dockerfiles with smoler
        run: |
          for dockerfile in dockerfiles/Dockerfile.*; do
            echo "Building ${dockerfile}"
            ./smoler.sh build -y "${dockerfile}"
          done

      - name: Push and pull image through in-memory registry
        env:
          SMOLREPO: localhost:5000/smolbsd
          ORAS_PLAIN_HTTP: "true"
        run: |
          image="images/basic-amd64:latest.img"
          test -f "${image}"

          ./smoler.sh push "${image}"

          rm -f "${image}"
          ./smoler.sh pull basic-amd64:latest

          test -f "${image}"

